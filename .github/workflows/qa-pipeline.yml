name: AI QA Pipeline

on:
  push:
    branches:
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  ai-qa-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────
      # 1. SETUP
      # ─────────────────────────────────────────

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make Gradle Executable
        run: chmod +x gradlew

      # ─────────────────────────────────────────
      # 2. DETECT WHO PUSHED
      # ─────────────────────────────────────────

      - name: Detect Push Context
        id: context
        run: |
          PUSHER="${{ github.actor }}"
          OWNER="${{ github.repository_owner }}"
          echo "Pushed by: $PUSHER | Owner: $OWNER"

          if [ "$PUSHER" == "$OWNER" ]; then
            echo "is_owner=true" >> $GITHUB_OUTPUT
          else
            echo "is_owner=false" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────
      # 3. DETECT CHANGED TESTABLE FILES
      # ─────────────────────────────────────────

      - name: Detect Changed Testable Files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep "\.kt$" || true)

          echo "All changed Kotlin files:"
          echo "$CHANGED"

          TESTABLE=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            BASENAME=$(basename "$file" .kt)

            # Skip non-testable UI files
            if echo "$BASENAME" | grep -qiE "^(MainActivity|.*Activity|.*Fragment|.*Screen|.*Theme|.*Color|.*Type|.*Shape|.*Navigation|.*Route|.*Preview|.*App$|.*Composable)"; then
              echo "Skipping UI file: $file"
              continue
            fi

            # Only include files with testable patterns
            if echo "$BASENAME" | grep -qiE "(ViewModel|Repository|UseCase|Manager|Helper|Utils|Service|Handler|Controller|Mapper|Factory|Provider|Interactor|DataSource|Client|Api|Dao|Worker|Scheduler|Validator|Parser|Formatter|Extension|Interceptor)"; then
              TESTABLE="$TESTABLE$file "
              echo "Testable: $file"
            fi
          done <<< "$CHANGED"

          TESTABLE=$(echo "$TESTABLE" | xargs)

          if [ -z "$TESTABLE" ]; then
            echo "has_testable=false" >> $GITHUB_OUTPUT
            echo "No testable files changed."
          else
            echo "has_testable=true" >> $GITHUB_OUTPUT
            echo "testable_files=$TESTABLE" >> $GITHUB_OUTPUT
            echo "Testable files: $TESTABLE"
          fi

      # ─────────────────────────────────────────
      # OWNER PUSHED — Analyze existing tests only
      # ─────────────────────────────────────────

      - name: Slack — Owner Push Analysis Started
        if: steps.context.outputs.is_owner == 'true' && steps.changed.outputs.has_testable == 'true'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*QA Analysis Started*\n*Branch:* \`${{ github.ref_name }}\`\n*Pushed by:* ${{ github.actor }}\n*Commit:* \`${{ github.sha }}\`\nAnalyzing locally generated tests...\"
          }"

      - name: Analyze Local Tests
        if: steps.context.outputs.is_owner == 'true' && steps.changed.outputs.has_testable == 'true'
        id: analyze
        run: |
          ISSUES=""
          GOOD=""

          for KOTLIN_FILE in ${{ steps.changed.outputs.testable_files }}; do
            FILENAME=$(basename "$KOTLIN_FILE" .kt)
            TEST_FILE="app/src/test/java/generated/${FILENAME}Test.kt"

            if [ ! -f "$TEST_FILE" ]; then
              ISSUES="${ISSUES}\n• No test file found for \`${FILENAME}.kt\`"
            else
              TEST_COUNT=$(grep -c "@Test" "$TEST_FILE" || echo "0")
              if [ "$TEST_COUNT" -eq "0" ]; then
                ISSUES="${ISSUES}\n• Test file exists but has no @Test methods: \`${FILENAME}Test.kt\`"
              else
                GOOD="${GOOD}\n• \`${FILENAME}Test.kt\` — ${TEST_COUNT} test(s) ✓"
              fi
            fi
          done

          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          echo "good=$GOOD" >> $GITHUB_OUTPUT

          if [ -z "$ISSUES" ]; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
          else
            echo "has_issues=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Tests (Owner Push)
        if: steps.context.outputs.is_owner == 'true' && steps.changed.outputs.has_testable == 'true'
        id: owner_run
        run: |
          set +e
          ./gradlew test 2>&1 | tee owner_test_output.txt
          OWNER_EXIT=${PIPESTATUS[0]}
          set -e
          PASSED=$(grep -c "PASSED" owner_test_output.txt || true)
          FAILED=$(grep -c "FAILED" owner_test_output.txt || true)
          echo "owner_exit=$OWNER_EXIT" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Slack — Analysis Report (All Good)
        if: >
          steps.context.outputs.is_owner == 'true' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.analyze.outputs.has_issues == 'false' &&
          steps.owner_run.outputs.owner_exit == '0'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*QA Analysis Complete* ✅\n*Branch:* \`${{ github.ref_name }}\`\n\nAll test cases are valid and passing.\n${{ steps.analyze.outputs.good }}\n\n*Total Passed:* ${{ steps.owner_run.outputs.passed }}\nNo action required.\"
          }"

      - name: Slack — Analysis Report (Issues Found)
        if: >
          steps.context.outputs.is_owner == 'true' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.analyze.outputs.has_issues == 'true'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*QA Analysis Report* ⚠️\n*Branch:* \`${{ github.ref_name }}\`\n\n*Issues Detected:*\n${{ steps.analyze.outputs.issues }}\n\n*Recommendation:* Please add or fix test cases for the above files before merging.\"
          }"

      - name: Slack — No Testable Files (Owner Push)
        if: steps.context.outputs.is_owner == 'true' && steps.changed.outputs.has_testable == 'false'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*QA Pipeline* ✅\n*Branch:* \`${{ github.ref_name }}\`\n*Pushed by:* ${{ github.actor }}\n\nNo testable files changed in this commit. No test generation required.\"
          }"

      # ─────────────────────────────────────────
      # EXTERNAL PUSH — Full Pipeline
      # ─────────────────────────────────────────

      - name: Slack — External Push Pipeline Started
        if: steps.context.outputs.is_owner == 'false' && steps.changed.outputs.has_testable == 'true'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*QA Pipeline Triggered* 🚀\n*Branch:* \`${{ github.ref_name }}\`\n*Pushed by:* ${{ github.actor }}\n*Commit:* \`${{ github.sha }}\`\nStarting automated test generation and validation...\"
          }"

      - name: Slack — No Testable Files (External Push)
        if: steps.context.outputs.is_owner == 'false' && steps.changed.outputs.has_testable == 'false'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*QA Pipeline* ✅\n*Branch:* \`${{ github.ref_name }}\`\n*Pushed by:* ${{ github.actor }}\n\nNo testable files (ViewModel/Repository/UseCase/etc.) were changed. No test generation required.\"
          }"

      - name: AI Generate Tests for Changed Files
        if: steps.context.outputs.is_owner == 'false' && steps.changed.outputs.has_testable == 'true'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"text\": \"*Generating Test Cases* 🤖\nProcessing changed testable files...\"}"

          mkdir -p app/src/test/java/generated
          GENERATED_COUNT=0
          SKIPPED_COUNT=0

          for KOTLIN_FILE in ${{ steps.changed.outputs.testable_files }}; do
            [ ! -f "$KOTLIN_FILE" ] && continue

            FILENAME=$(basename "$KOTLIN_FILE" .kt)
            TEST_FILE="app/src/test/java/generated/${FILENAME}Test.kt"

            if [ -f "$TEST_FILE" ]; then
              EXISTING=$(grep -c "@Test" "$TEST_FILE" || echo "0")
              if [ "$EXISTING" -gt "0" ]; then
                echo "Skipping — tests already exist: $FILENAME ($EXISTING tests)"
                SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                continue
              fi
            fi

            SOURCE_CODE=$(cat "$KOTLIN_FILE" | jq -Rs .)

            RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
              -H "Authorization: Bearer ${{ secrets.GITHUB_AI_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"model\": \"gpt-4o\",
                \"messages\": [
                  {
                    \"role\": \"system\",
                    \"content\": \"You are an expert Android SDK test engineer. Generate meaningful, comprehensive JUnit4 + Mockito test cases. Rules: Return ONLY valid Kotlin test code. No markdown, no backticks, no explanation. Cover happy path, edge cases, null inputs, exceptions. Use correct package names. Mock all dependencies.\"
                  },
                  {
                    \"role\": \"user\",
                    \"content\": \"Generate comprehensive JUnit4 + Mockito tests for all public methods in this Kotlin file.\n\nFile path: $KOTLIN_FILE\n\nCode:\n$SOURCE_CODE\"
                  }
                ],
                \"max_tokens\": 4000
              }")

            echo "$RESPONSE" | jq -r '.choices[0].message.content' > "$TEST_FILE"
            GENERATED_COUNT=$((GENERATED_COUNT + 1))
            echo "Generated: $TEST_FILE"
          done

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*Test Generation Complete* ✅\n*Generated:* ${GENERATED_COUNT} new test file(s)\n*Skipped (tests already exist):* ${SKIPPED_COUNT} file(s)\"
          }"

      - name: Run Tests
        if: steps.context.outputs.is_owner == 'false' && steps.changed.outputs.has_testable == 'true'
        id: run_tests
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"text\": \"*Running Test Suites* ⚙️\"}"

          set +e
          ./gradlew test 2>&1 | tee test_output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          PASSED=$(grep -c "PASSED" test_output.txt || true)
          FAILED=$(grep -c "FAILED" test_output.txt || true)

          echo "test_exit=$TEST_EXIT" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Slack — All Tests Passed
        if: >
          steps.context.outputs.is_owner == 'false' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.run_tests.outputs.test_exit == '0'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*All Tests Passed* ✅\n*Branch:* \`${{ github.ref_name }}\`\n*Pushed by:* ${{ github.actor }}\n*Tests Passed:* ${{ steps.run_tests.outputs.passed }}\"
          }"

      - name: AI Auto Fix Failed Tests
        if: >
          steps.context.outputs.is_owner == 'false' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.run_tests.outputs.test_exit != '0'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*Test Failures Detected* ❌\n*Passed:* ${{ steps.run_tests.outputs.passed }}\n*Failed:* ${{ steps.run_tests.outputs.failed }}\nAI is analyzing and applying fixes...\"
          }"

          ERROR_LOG=$(cat test_output.txt | tail -100 | jq -Rs .)

          find app/src/test/java/generated -name "*Test.kt" | while read TEST_FILE; do
            FILENAME=$(basename "$TEST_FILE" .kt)
            if grep -q "$FILENAME" test_output.txt; then
              TEST_CODE=$(cat "$TEST_FILE" | jq -Rs .)
              FIXED=$(curl -s https://models.inference.ai.azure.com/chat/completions \
                -H "Authorization: Bearer ${{ secrets.GITHUB_AI_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"model\": \"gpt-4o\",
                  \"messages\": [
                    {
                      \"role\": \"system\",
                      \"content\": \"Fix this failing Kotlin test file. Return ONLY the fixed Kotlin code. No markdown, no explanation.\"
                    },
                    {
                      \"role\": \"user\",
                      \"content\": \"Fix this test based on the error log.\n\nError:\n$ERROR_LOG\n\nTest:\n$TEST_CODE\"
                    }
                  ],
                  \"max_tokens\": 4000
                }")
              echo "$FIXED" | jq -r '.choices[0].message.content' > "$TEST_FILE"
              echo "Fixed: $TEST_FILE"
            fi
          done

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"text\": \"*AI Fix Applied* 🔧\nRe-running tests to verify...\"}"

      - name: Re-run Tests After Fix
        if: >
          steps.context.outputs.is_owner == 'false' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.run_tests.outputs.test_exit != '0'
        id: rerun_tests
        run: |
          set +e
          ./gradlew test 2>&1 | tee rerun_output.txt
          RERUN_EXIT=${PIPESTATUS[0]}
          set -e
          PASSED2=$(grep -c "PASSED" rerun_output.txt || true)
          FAILED2=$(grep -c "FAILED" rerun_output.txt || true)
          echo "rerun_exit=$RERUN_EXIT" >> $GITHUB_OUTPUT
          echo "passed2=$PASSED2" >> $GITHUB_OUTPUT
          echo "failed2=$FAILED2" >> $GITHUB_OUTPUT

      - name: Slack — AI Fixed Successfully
        if: >
          steps.context.outputs.is_owner == 'false' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.run_tests.outputs.test_exit != '0' &&
          steps.rerun_tests.outputs.rerun_exit == '0'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*AI Fixed All Tests* 🎉\n*Branch:* \`${{ github.ref_name }}\`\n*Tests Passing:* ${{ steps.rerun_tests.outputs.passed2 }}\nCommitting fixed test files to branch...\"
          }"

      - name: Slack — Manual Review Required
        if: >
          steps.context.outputs.is_owner == 'false' &&
          steps.changed.outputs.has_testable == 'true' &&
          steps.run_tests.outputs.test_exit != '0' &&
          steps.rerun_tests.outputs.rerun_exit != '0'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"*Manual Review Required* 🚨\n*Branch:* \`${{ github.ref_name }}\`\n*Pushed by:* ${{ github.actor }}\n*Still Failing:* ${{ steps.rerun_tests.outputs.failed2 }} test(s)\nAI was unable to resolve all failures. Manual intervention needed.\"
          }"

      # ─────────────────────────────────────────
      # COMMIT GENERATED/FIXED TESTS BACK TO BRANCH
      # ─────────────────────────────────────────

      - name: Commit Generated Tests to Branch
        if: steps.context.outputs.is_owner == 'false' && steps.changed.outputs.has_testable == 'true'
        run: |
          git config --global user.email "qa-bot@github-actions.com"
          git config --global user.name "QA Bot"

          git add app/src/test/java/generated/

          if git diff --staged --quiet; then
            echo "No new test files to commit."
          else
            git commit -m "test: AI generated/fixed test cases [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "Test files committed and pushed."
          fi
